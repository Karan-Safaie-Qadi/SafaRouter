<div class="page-enter">
  <h1>Contact</h1>
  <p style="color: var(--color-text-muted); margin-bottom: 1.5rem;">
    This page demonstrates query parameter handling.
  </p>

  <div class="card">
    <h2>Query Params</h2>
    <p>Query: <code>subject={{ query.subject }} &amp; lang={{ query.lang }}</code></p>
    <p style="margin-top: 0.75rem; font-size: 0.875rem;">
      Try navigating with query params:
    </p>
    <div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.5rem;">
      <a href="/test-app/contact?subject=hello&amp;lang=en" data-safa-link class="sandbox-btn">?subject=hello&amp;lang=en</a>
      <a href="/test-app/contact?page=1&amp;sort=asc" data-safa-link class="sandbox-btn">?page=1&amp;sort=asc</a>
      <a href="/test-app/contact" data-safa-link class="sandbox-btn">(no query)</a>
    </div>
  </div>

  <div class="card">
    <h2>Get in touch</h2>
    <p><em>This is a demo — no form functionality.</em></p>
  </div>
</div>
