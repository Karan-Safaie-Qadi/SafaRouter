<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>خانه | صفا-router (Svelte)</title>
  <style>
    :root {
      --color-bg: #0f172a;
      --color-surface: #1e293b;
      --color-text: #f1f5f9;
      --color-text-muted: #94a3b8;
      --color-accent: #3b82f6;
      --color-accent-hover: #2563eb;
      --color-border: #334155;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.7;
      min-height: 100vh;
    }
    .layout { max-width: 960px; margin: 0 auto; padding: 0 1.5rem; }
    header {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header .layout { display: flex; align-items: center; justify-content: space-between; }
    header .logo { font-size: 1.25rem; font-weight: 700; color: var(--color-accent); text-decoration: none; }
    nav { display: flex; gap: 1rem; }
    nav a {
      color: var(--color-text-muted);
      text-decoration: none;
      font-size: 0.925rem;
      padding: 0.375rem 0.75rem;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }
    nav a:hover { color: var(--color-text); background: rgba(255,255,255,0.05); }
    main { min-height: 60vh; padding: 2rem 0; }
    main h1 { font-size: 2rem; font-weight: 800; margin-bottom: 1rem; }
    main p { color: var(--color-text-muted); margin-bottom: 1.5rem; }
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card h2 { font-size: 1.25rem; margin-bottom: 0.75rem; }
    .card p { color: var(--color-text-muted); }
    .btn {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      background: var(--color-accent);
      color: #fff;
      border-radius: 6px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--color-accent-hover); }
    .btn-outline { background: transparent; border: 1px solid var(--color-border); color: var(--color-text); }
    .btn-outline:hover { background: var(--color-surface); }
    footer {
      border-top: 1px solid var(--color-border);
      padding: 1.5rem 0;
      text-align: center;
      color: var(--color-text-muted);
      font-size: 0.875rem;
    }
    #app { display: contents; }
    @media (max-width: 600px) { header .layout { flex-direction: column; gap: 0.75rem; } }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="main.js"></script>
</body>
</html>
